name: CI/CD (Laravel)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest
  test-build-push:
    runs-on: ubuntu-latest
    needs: tests
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/laravel-livewire

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- 1️⃣ Instalar PHP 8.4 ----------
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'          # <-- versión actualizada
          extensions: mbstring, intl, bcmath, pcntl, zip, gd
          coverage: none
          tools: composer

      # ---------- 2️⃣ Instalar dependencias y correr tests ----------
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      # ---------- 3️⃣ Login al registro Docker ----------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # ---------- 4️⃣ Build de la imagen ----------
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ---------- 5️⃣ Push de la imagen ----------
      - name: Push Docker image to Docker Hub
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.DOCKER_HUB_USERNAME }}/laravel-livewire:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/laravel-livewire:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/laravel-livewire:${{ github.sha }}

      # ---------- 6️⃣ Limpieza ----------
      - name: Clean up local images
        if: always()
        run: docker image prune -af
